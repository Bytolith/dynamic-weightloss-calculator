<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="theme-color" content="#000000">
        <title>Dynamic Weight Loss Calculator</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div class="container">
            <header>
                <h1>WEIGHT LOSS <span>CALCULATOR</span></h1>
            </header>

            <main>
                <!-- Stats -->
                <label class="section-label">YOUR STATS</label>
                <div class="grid-4">
                    <!-- gender -->
                    <div class="field mobile-mod">
                        <label class="subsection-label">GENDER</label>
                        <div class="input-with-unit">
                            <button class="gender-button active" id="buttonMale" onclick="setGender('male')">Male</button>
                            <button class="gender-button" id="buttonFemale" onclick="setGender('female')">Female</button>
                        </div>
                    </div>
                    <!-- age -->
                    <div class="field mobile-mod">
                        <label class="subsection-label">AGE</label>
                        <div class="input-with-unit">
                            <input type="range" id="ageSlider" min="15" max="80" step="1" value="25">
                        </div>
                        <span id="ageVal" class="margin-top-neg-10">25 yrs</span>
                    </div>
                    <!-- height -->
                    <div class="field span-2">
                        <label class="subsection-label">HEIGHT</label>
                        <div class="height-inputs">
                            <div class="height-field">
                                <span class="subsubsection-label">FEET</span>
                                <input type="number" id="heightFt" min="3" max="7" value="6" oninput="updateHeight()">
                            </div>
                            <div class="height-field">
                                <span class="subsubsection-label">INCHES</span>
                                <input type="number" id="heightIn" min="0" max="11" value="0" oninput="updateHeight()">
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Weight Goals -->
                <label class="section-label">WEIGHT GOALS</label>
                <div class="grid-2">
                    <!-- current weight -->
                    <div class="field">
                        <label class="subsection-label">CURRENT WEIGHT:</label>
                        <div class="input-with-unit">
                            <input type="range" id="currentWeight" min="50" max="400" step="1" value="220">
                        </div>
                        <span id ="currentWeightValue" class="margin-top-neg-10">220 lbs</span>
                    </div>
                    <!-- goal weight -->
                    <div class="field">
                        <label class="subsection-label">GOAL WEIGHT:</label>
                        <div class="input-with-unit">
                            <input type="range" id="goalWeight" min="50" max="500" step="5" value="180">
                        </div>
                        <span id ="goalWeightValue" class="margin-top-neg-10">180 lbs</span>
                    </div>
                </div>
                <!-- Daily Stats-->
                <label class="section-label">DAILY STATS</label>
                <div class="grid-3">
                    <div class="field">
                        <label class="subsection-label">CALORIC INTAKE:</label>
                        <div class="input-with-unit">
                            <input type="range" id="calorieIntake" min="0" max="4000" step="50" value="1500">
                        </div>
                        <span id="calorieIntakeValue" class="margin-top-neg-10">1500 kcal</span>
                    </div>
                    <div class="field">
                        <label class="subsection-label">WALK TIME:</label>
                        <div class="input-with-unit">
                            <input type="range" id="walkTime" min="0" max="360" step="5" value="60">
                        </div>
                        <span id="walkTimeValue" class="margin-top-neg-10">60 min</span>
                    </div>
                    <div class="field">
                        <label class="subsection-label">WALK SPEED:</label>
                        <div class="input-with-unit">
                            <input type="range" id="walkSpeed" min="0" max="5" step="0.5" value="1.5">
                        </div>
                        <span id="walkSpeedValue" class="margin-top-neg-10">1.5 mph</span>
                    </div>
                </div>
                <!-- Results -->
                <label class="section-label">RESULTS</label>
                <div class="results grid-4">
                    <!-- Resting BMR -->
                    <div class="field">
                        <label class="subsection-label">BASE BMR:</label>
                        <span id="restingBMRValue" class="accent-text">0</span>
                        <span class="subsection-label">kcal/day (Mifflin-St Jeor)<span>
                    </div>
                    <!-- Walking Calories Burned -->
                    <div class="field">
                        <label class="subsection-label">WALKING BURN:</label>
                        <span id="walkingCaloriesBurnedValue" class="accent-text">0</span>
                        <span class="subsection-label">kcal/day (Ludlow & Weyand)<span>
                    </div>
                    <!-- Total Calories Burned -->
                    <div class="field">
                        <label class="subsection-label">TOTAL BURN:</label>
                        <span id="totalCaloriesBurnedValue" class="accent-text">0</span>
                        <span class="subsection-label">kcal/day<span>
                    </div>
                    <!-- Net Calories -->
                    <div class="field">
                        <label class="subsection-label">NET DEFICIT:</label>
                        <span id="netCaloriesValue" class="accent-text">0</span>
                        <span class="subsection-label">kcal/day(+ = losing)<span>
                    </div>
                </div>
                <div class="grid-3 results-summary">
                    <!-- AVG Daylie Deficit -->
                    <div class="field">
                        <span id="avgDailyDeficitValue" class="results-text">0</span>
                        <label class="subsection-label center-text">AVG DAILY DEFICIT</label>
                    </div>
                    <!-- Days To Goal -->
                    <div class="field">
                        <span id="daysToGoalValue" class="results-text accent-text">0</span>
                        <label class="subsection-label center-text">DAYS TO GOAL</label>
                    </div>
                    <!-- LBS to Lose -->
                    <div class="field">
                        <span id="lbsToLoseValue" class="results-text">0</span>
                        <label class="subsection-label center-text">LBS TO LOSE</label>
                    </div>
                </div>

                <div class="field margin-top-20">
                    <label class="subsection-label">WEIGHT PROJECTION OVER TIME</label>
                    <canvas id="myChart"></canvas>
                </div>
            </main>
        </div>
        <script type="module" src="js/script.js"></script>
    </body>
</html>
